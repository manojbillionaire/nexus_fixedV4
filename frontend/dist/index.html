  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; color: #e2e8f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    /* Fix for mobile Chrome: 100vh includes the URL bar, causing content to be hidden.
       Use CSS custom property --vh set by JS, falling back to 100vh on desktop. */
    :root { --vh: 1vh; }
    #root { height: 100vh; height: calc(var(--vh, 1vh) * 100); overflow: hidden; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-CU2TQPbr.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Fix mobile Chrome 100vh bug — set --vh to actual visible viewport height
    function setVh() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', function() { setTimeout(setVh, 200); });
  </script>
</body>
